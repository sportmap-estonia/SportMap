$kind: http-request
name: Create Place
method: POST
url: '{{baseUrl}}/api/places'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Sample Place",
      "description": "A description of the place",
      "placeTypeId": "00000000-0000-0000-0000-000000000000",
      "latitude": 0.0,
      "longitude": 0.0,
      "address": "123 Example Street",
      "creatorId": "00000000-0000-0000-0000-000000000000"
    }
